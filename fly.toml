app = "motion-scanner-v3"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV  = "production"
  PORT      = "8080"
  FRONTEND_DIST = "/app/artifacts/motion-scanner/dist/public"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 500
    soft_limit = 200

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"
