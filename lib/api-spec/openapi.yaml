openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Motion Scanner v3.0 API
servers:
  - url: /api
    description: Base API path
tags:
  - name: chart
    description: OHLCV chart data
  - name: health
    description: Health operations
  - name: openai
    description: OpenAI AI chat and agent operations
  - name: scan
    description: Scanner engine
  - name: watchlists
    description: Ticker watchlists
  - name: config
    description: Tenant scan configuration
  - name: broker
    description: Alpaca broker integration
  - name: sector
    description: Sector rotation
  - name: audit
    description: Audit logs
  - name: apikeys
    description: Tenant API key management
  - name: amf
    description: A.M.F. 52-period range phase scanner (Low→High + High→Low mirror)
paths:
  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"
  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiMessageInput"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── SCAN ─────────────────────────────────────────────────────────────────
  /scan:
    post:
      operationId: runScan
      tags: [scan]
      summary: Run a scan on a list of tickers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanRequest"
      responses:
        "200":
          description: Scan results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResult"

  /scan/history:
    get:
      operationId: listScanHistory
      tags: [scan]
      summary: List past scan runs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Scan history list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanHistoryList"

  /scan/history/{id}:
    get:
      operationId: getScanHistory
      tags: [scan]
      summary: Get a specific scan result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Scan result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanHistoryItem"
        "404":
          description: Not found

  # ── WATCHLISTS ────────────────────────────────────────────────────────────
  /watchlists:
    get:
      operationId: listWatchlists
      tags: [watchlists]
      summary: List all watchlists for tenant
      responses:
        "200":
          description: Watchlist array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Watchlist"
    post:
      operationId: createWatchlist
      tags: [watchlists]
      summary: Create a watchlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchlistInput"
      responses:
        "201":
          description: Created watchlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Watchlist"

  /watchlists/{id}:
    get:
      operationId: getWatchlist
      tags: [watchlists]
      summary: Get a watchlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Watchlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Watchlist"
        "404":
          description: Not found
    put:
      operationId: updateWatchlist
      tags: [watchlists]
      summary: Update a watchlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchlistInput"
      responses:
        "200":
          description: Updated watchlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Watchlist"
    delete:
      operationId: deleteWatchlist
      tags: [watchlists]
      summary: Delete a watchlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── CONFIG ────────────────────────────────────────────────────────────────
  /config:
    get:
      operationId: getConfig
      tags: [config]
      summary: Get tenant scan configuration
      responses:
        "200":
          description: Scan configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanConfig"
    put:
      operationId: updateConfig
      tags: [config]
      summary: Update tenant scan configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanConfigInput"
      responses:
        "200":
          description: Updated configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanConfig"

  # ── BROKER ────────────────────────────────────────────────────────────────
  /broker/account:
    get:
      operationId: getBrokerAccount
      tags: [broker]
      summary: Get Alpaca account status
      responses:
        "200":
          description: Account details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerAccount"
        "503":
          description: Broker not configured

  /broker/execute:
    post:
      operationId: executeTrades
      tags: [broker]
      summary: Execute bracket orders for GO candidates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecuteRequest"
      responses:
        "200":
          description: Execution results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExecutionResult"

  /broker/positions:
    get:
      operationId: getBrokerPositions
      tags: [broker]
      summary: Get open Alpaca positions
      responses:
        "200":
          description: Open positions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Position"

  # ── SECTOR ────────────────────────────────────────────────────────────────
  /sector-rotation:
    get:
      operationId: getSectorRotation
      tags: [sector]
      summary: Get sector rotation heatmap data
      responses:
        "200":
          description: Sector rotation data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SectorRotation"

  # ── SCREENER ───────────────────────────────────────────────────────────────
  /screener:
    get:
      operationId: runScreener
      tags: [scan]
      summary: Reverse screener — find stocks matching filter parameters from the S&P 100 universe
      parameters:
        - name: priceMin
          in: query
          schema: { type: number, default: 1 }
        - name: priceMax
          in: query
          schema: { type: number, default: 10000 }
        - name: rsiMin
          in: query
          schema: { type: number, default: 0 }
        - name: rsiMax
          in: query
          schema: { type: number, default: 100 }
        - name: adxMin
          in: query
          schema: { type: number, default: 0 }
        - name: rvolMin
          in: query
          schema: { type: number, default: 0 }
        - name: scoreMin
          in: query
          schema: { type: number, default: 0 }
        - name: verdictFilter
          in: query
          schema: { type: string, enum: [all, go, go_hold], default: all }
        - name: aboveEma10
          in: query
          schema: { type: boolean }
        - name: aboveSma20
          in: query
          schema: { type: boolean }
        - name: emaStackRequired
          in: query
          schema: { type: boolean }
        - name: stochMin
          in: query
          schema: { type: number }
        - name: stochMax
          in: query
          schema: { type: number }
        - name: macd3mAboveZero
          in: query
          schema: { type: boolean }
        - name: macd3mHistPositive
          in: query
          schema: { type: boolean }
        - name: breakoutOnly
          in: query
          schema: { type: boolean }
        - name: universe
          in: query
          schema: { type: string, enum: [sp100, nasdaq100, dow30, tech, finance, health, energy, consumer, industrials, utilities, materials, realestate, comms, semis, biotech, smallcap, mags7, aicloud, dividend, all], default: sp100 }
        - name: bust
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Screener results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScreenerResult"

  # ── FULL-MARKET SCAN JOBS ──────────────────────────────────────────────────
  /scan-jobs:
    post:
      operationId: startFullMarketScan
      tags: [scan]
      summary: Start a background scan of the entire US market (~6000 NYSE/NASDAQ stocks)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartFullMarketScanBody"
      responses:
        "200":
          description: The created (or already-running) scan job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanJob"

  /scan-jobs/latest:
    get:
      operationId: getLatestScanJob
      tags: [scan]
      summary: Get the most recent full-market scan job for the current tenant
      responses:
        "200":
          description: Latest scan job (or null if none exists)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LatestScanJob"

  /scan-jobs/{id}/results:
    get:
      operationId: getScanJobResults
      tags: [scan]
      summary: Get filtered results from a completed full-market scan job
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: priceMin
          in: query
          schema: { type: number, default: 1 }
        - name: priceMax
          in: query
          schema: { type: number, default: 10000 }
        - name: rsiMin
          in: query
          schema: { type: number, default: 0 }
        - name: rsiMax
          in: query
          schema: { type: number, default: 100 }
        - name: adxMin
          in: query
          schema: { type: number, default: 0 }
        - name: rvolMin
          in: query
          schema: { type: number, default: 0 }
        - name: scoreMin
          in: query
          schema: { type: number, default: 0 }
        - name: verdictFilter
          in: query
          schema: { type: string, enum: [all, go, go_hold], default: all }
        - name: aboveEma10
          in: query
          schema: { type: boolean }
        - name: aboveSma20
          in: query
          schema: { type: boolean }
        - name: emaStackRequired
          in: query
          schema: { type: boolean }
        - name: stochMin
          in: query
          schema: { type: number }
        - name: stochMax
          in: query
          schema: { type: number }
        - name: macd3mAboveZero
          in: query
          schema: { type: boolean }
        - name: macd3mHistPositive
          in: query
          schema: { type: boolean }
        - name: breakoutOnly
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Filtered scan-job results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScreenerResult"

  /notes:
    get:
      operationId: getNotes
      tags: [notes]
      summary: List all notes for the current tenant
      responses:
        "200":
          description: List of notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"
    post:
      operationId: createNote
      tags: [notes]
      summary: Create a new note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteInput"
      responses:
        "201":
          description: Created note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"

  /notes/{id}:
    put:
      operationId: updateNote
      tags: [notes]
      summary: Update a note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteInput"
      responses:
        "200":
          description: Updated note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
    delete:
      operationId: deleteNote
      tags: [notes]
      summary: Delete a note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── NEWS ──────────────────────────────────────────────────────────────────
  /news:
    get:
      operationId: getNews
      tags: [scan]
      summary: Tier-1 financial news feed (global + USA)
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [general, forex, merger, all]
            default: all
      responses:
        "200":
          description: News articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsFeed"

  # ── CHART ─────────────────────────────────────────────────────────────────
  /chart/{ticker}:
    get:
      operationId: getChart
      tags: [scan]
      summary: OHLCV candle data for a ticker
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
        - name: range
          in: query
          schema:
            type: string
            enum: [1mo, 3mo, 6mo, 1y, 2y]
            default: 3mo
        - name: interval
          in: query
          schema:
            type: string
            enum: [1d, 1wk]
            default: 1d
      responses:
        "200":
          description: OHLCV candle data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChartData"

  # ── AUDIT LOGS ────────────────────────────────────────────────────────────
  /audit-logs:
    get:
      operationId: listAuditLogs
      tags: [audit]
      summary: List SOC 2 audit events for tenant
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Audit log list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogList"

  # ── API KEYS ──────────────────────────────────────────────────────────────
  /api-keys:
    get:
      operationId: getApiKeys
      tags: [apikeys]
      summary: Get masked API keys for tenant
      responses:
        "200":
          description: Masked key info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyStatus"
    put:
      operationId: updateApiKeys
      tags: [apikeys]
      summary: Store or update encrypted API keys
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiKeyInput"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyStatus"

  # ── DASHBOARD SUMMARIES (wow endpoints) ───────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [scan]
      summary: Dashboard summary — recent scan stats + regime
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  # ── AMF ───────────────────────────────────────────────────────────────────────
  /amf/discover:
    get:
      operationId: amfDiscover
      tags: [amf]
      summary: Discover tickers from a Yahoo Finance predefined screener
      parameters:
        - name: screen
          in: query
          required: true
          schema:
            type: string
          description: "Yahoo Finance predefined screener ID (e.g. most_actives, day_gainers)"
        - name: count
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 10
            maximum: 100
          description: Number of tickers to return
      responses:
        "200":
          description: Discovered tickers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AmfDiscoverResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string

  /amf:
    post:
      operationId: runAmfScan
      tags: [amf]
      summary: Run A.M.F. scanner — classify tickers into 52-period range phases (Low→High + mirror)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AmfRequest"
      responses:
        "200":
          description: A.M.F. scan results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AmfScanResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── SCAN ─────────────────────────────────────────────────────────────
    ScanRequest:
      type: object
      required: [tickers]
      properties:
        tickers:
          type: array
          items:
            type: string
          maxItems: 50
        watchlistId:
          type: ["integer", "null"]
        configOverride:
          type: ["object", "null"]
          additionalProperties: true
        computeOptions:
          type: boolean
          default: true
        computeSectors:
          type: boolean
          default: true

    CandidateRecord:
      type: object
      required: [ticker, verdict, score]
      properties:
        ticker:
          type: string
        verdict:
          type: string
          enum: [GO, HOLD, ABORT]
        score:
          type: number
        reason:
          type: string
        technical:
          type: ["object", "null"]
          additionalProperties: true
        fundamentals:
          type: ["object", "null"]
          additionalProperties: true
        flow:
          type: ["object", "null"]
          additionalProperties: true
        monteCarlo:
          type: ["object", "null"]
          additionalProperties: true
        indicators:
          type: ["object", "null"]
          additionalProperties: true
        optionsFlow:
          type: ["object", "null"]
          additionalProperties: true
        options:
          type: ["object", "null"]
          additionalProperties: true
        sentiment:
          type: ["object", "null"]
          additionalProperties: true
        sectorContext:
          type: ["object", "null"]
          additionalProperties: true

    ScanResult:
      type: object
      required: [id, timestamp, candidates, hold, rejected]
      properties:
        id:
          type: integer
        timestamp:
          type: string
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/CandidateRecord"
        hold:
          type: array
          items:
            $ref: "#/components/schemas/CandidateRecord"
        rejected:
          type: array
          items:
            $ref: "#/components/schemas/CandidateRecord"
        sectorRotation:
          type: ["object", "null"]
          additionalProperties: true
        activeProviders:
          type: array
          items:
            type: string

    ScanHistoryItem:
      type: object
      required: [id, createdAt, tickerCount, goCount, holdCount, rejectCount]
      properties:
        id:
          type: integer
        createdAt:
          type: string
        tickerCount:
          type: integer
        goCount:
          type: integer
        holdCount:
          type: integer
        rejectCount:
          type: integer
        regime:
          type: ["string", "null"]
        payload:
          type: ["object", "null"]
          additionalProperties: true

    ScanHistoryList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ScanHistoryItem"
        total:
          type: integer

    # ── WATCHLIST ─────────────────────────────────────────────────────────
    Watchlist:
      type: object
      required: [id, name, tickers, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        tickers:
          type: array
          items:
            type: string
        description:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    WatchlistInput:
      type: object
      required: [name, tickers]
      properties:
        name:
          type: string
          minLength: 1
        tickers:
          type: array
          items:
            type: string
        description:
          type: ["string", "null"]

    # ── CONFIG ────────────────────────────────────────────────────────────
    ScanConfig:
      type: object
      required: [id, config]
      properties:
        id:
          type: integer
        config:
          type: object
          additionalProperties: true
        updatedAt:
          type: string

    ScanConfigInput:
      type: object
      required: [config]
      properties:
        config:
          type: object
          additionalProperties: true

    # ── BROKER ────────────────────────────────────────────────────────────
    BrokerAccount:
      type: object
      required: [equity, buyingPower, cash, portfolioValue, paper]
      properties:
        equity:
          type: number
        lastEquity:
          type: number
        buyingPower:
          type: number
        cash:
          type: number
        portfolioValue:
          type: number
        paper:
          type: boolean
        dayPl:
          type: ["number", "null"]
        dayPlPct:
          type: ["number", "null"]

    ExecuteRequest:
      type: object
      required: [candidates]
      properties:
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/CandidateRecord"
        dryRun:
          type: boolean
          default: true
        configOverride:
          type: ["object", "null"]
          additionalProperties: true

    ExecutionResult:
      type: object
      required: [ok, ticker]
      properties:
        ok:
          type: boolean
        ticker:
          type: string
        orderId:
          type: ["string", "null"]
        qty:
          type: integer
        entry:
          type: number
        target:
          type: number
        stop:
          type: number
        reason:
          type: string

    Position:
      type: object
      required: [symbol, qty, marketValue, unrealizedPl]
      properties:
        symbol:
          type: string
        qty:
          type: number
        marketValue:
          type: number
        unrealizedPl:
          type: number
        unrealizedPlPct:
          type: number
        currentPrice:
          type: number
        entryPrice:
          type: number

    # ── SECTOR ────────────────────────────────────────────────────────────
    SectorEntry:
      type: object
      required: [etf, name, ret1d, ret5d, ret20d, rs1d, rs5d, rs20d, leader, laggard]
      properties:
        etf:
          type: string
        name:
          type: string
        ret1d:
          type: number
        ret5d:
          type: number
        ret20d:
          type: number
        rs1d:
          type: number
        rs5d:
          type: number
        rs20d:
          type: number
        leader:
          type: boolean
        laggard:
          type: boolean

    SectorRotation:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
        regime:
          type: ["string", "null"]
        cyclicalRs:
          type: ["number", "null"]
        defensiveRs:
          type: ["number", "null"]
        sectors:
          type: array
          items:
            $ref: "#/components/schemas/SectorEntry"
        leaders:
          type: array
          items:
            $ref: "#/components/schemas/SectorEntry"
        laggards:
          type: array
          items:
            $ref: "#/components/schemas/SectorEntry"
        spyReturns:
          type: ["object", "null"]
          additionalProperties: true

    # ── AUDIT LOGS ────────────────────────────────────────────────────────
    AuditLogEntry:
      type: object
      required: [id, action, createdAt]
      properties:
        id:
          type: integer
        action:
          type: string
        resourceType:
          type: ["string", "null"]
        resourceId:
          type: ["string", "null"]
        userId:
          type: ["string", "null"]
        ipAddress:
          type: ["string", "null"]
        metadata:
          type: ["object", "null"]
          additionalProperties: true
        createdAt:
          type: string

    AuditLogList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuditLogEntry"
        total:
          type: integer

    # ── API KEYS ──────────────────────────────────────────────────────────
    ApiKeyStatus:
      type: object
      properties:
        alpacaConfigured:
          type: boolean
        tradierConfigured:
          type: boolean
        polygonConfigured:
          type: boolean
        finnhubConfigured:
          type: boolean
        discordConfigured:
          type: boolean
        alpacaPaper:
          type: boolean

    ApiKeyInput:
      type: object
      properties:
        alpacaApiKey:
          type: ["string", "null"]
        alpacaSecretKey:
          type: ["string", "null"]
        alpacaPaper:
          type: ["boolean", "null"]
        tradierApiKey:
          type: ["string", "null"]
        polygonApiKey:
          type: ["string", "null"]
        finnhubApiKey:
          type: ["string", "null"]
        discordWebhookUrl:
          type: ["string", "null"]


    ScreenerResult:
      type: object
      required: [results, total, scanned, cachedAt]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/CandidateRecord"
        total:
          type: integer
        scanned:
          type: integer
        cachedAt:
          type: string

    # ── FULL-MARKET SCAN JOBS ──────────────────────────────────────────────
    StartFullMarketScanBody:
      type: object
      properties:
        limit:
          type: integer
          description: Optional cap on number of tickers (for testing); omit to scan the whole market.

    ScanJob:
      type: object
      required: [id, tenantId, status, universe, total, processed, goCount, holdCount, rejectCount, createdAt]
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        status:
          type: string
          enum: [pending, running, completed, failed]
        universe:
          type: string
        total:
          type: integer
        processed:
          type: integer
        goCount:
          type: integer
        holdCount:
          type: integer
        rejectCount:
          type: integer
        error:
          type: ["string", "null"]
        createdAt:
          type: string
        startedAt:
          type: ["string", "null"]
        completedAt:
          type: ["string", "null"]

    LatestScanJob:
      type: object
      required: [job]
      properties:
        job:
          oneOf:
            - $ref: "#/components/schemas/ScanJob"
            - type: "null"

    # ── NOTES ─────────────────────────────────────────────────────────────
    Note:
      type: object
      required: [id, tenantId, title, content, createdAt, updatedAt]
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        title:
          type: string
        content:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    NoteInput:
      type: object
      properties:
        title:
          type: string
        content:
          type: string

    # ── NEWS ──────────────────────────────────────────────────────────────
    NewsArticle:
      type: object
      required: [id, headline, summary, source, sourceLabel, url, publishedAt, relatedTickers, category, sentiment, isBreaking]
      properties:
        id:
          type: string
        headline:
          type: string
        summary:
          type: string
        source:
          type: string
        sourceLabel:
          type: string
        url:
          type: string
        image:
          type: ["string", "null"]
        publishedAt:
          type: string
        relatedTickers:
          type: array
          items:
            type: string
        category:
          type: string
        sentiment:
          type: string
          enum: [bullish, bearish, neutral]
        isBreaking:
          type: boolean

    NewsFeed:
      type: object
      required: [articles, source, category]
      properties:
        articles:
          type: array
          items:
            $ref: "#/components/schemas/NewsArticle"
        source:
          type: string
        category:
          type: string

    # ── CHART ─────────────────────────────────────────────────────────────
    Candle:
      type: object
      required: [time, open, high, low, close, volume]
      properties:
        time:
          type: integer
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: number

    ChartData:
      type: object
      required: [ticker, range, candles]
      properties:
        ticker:
          type: string
        range:
          type: string
        candles:
          type: array
          items:
            $ref: "#/components/schemas/Candle"

    # ── OPENAI ────────────────────────────────────────────────────────────
    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, title, createdAt]
    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, conversationId, role, content, createdAt]
    OpenaiConversationInput:
      type: object
      properties:
        title:
          type: string
      required: [title]
    OpenaiMessageInput:
      type: object
      properties:
        content:
          type: string
      required: [content]
    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required: [id, title, createdAt, messages]
    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required: [error]

    # ── DASHBOARD ─────────────────────────────────────────────────────────
    DashboardSummary:
      type: object
      required: [totalScans, avgGoCount, avgScore, lastRegime, lastScanAt]
      properties:
        totalScans:
          type: integer
        avgGoCount:
          type: number
        avgScore:
          type: number
        lastRegime:
          type: ["string", "null"]
        lastScanAt:
          type: ["string", "null"]
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ScanHistoryItem"
        topTickers:
          type: array
          items:
            type: object
            required: [ticker, goCount, avgScore]
            properties:
              ticker:
                type: string
              goCount:
                type: integer
              avgScore:
                type: number

    # ── AMF ───────────────────────────────────────────────────────────────
    AmfRequest:
      type: object
      required: [tickers]
      properties:
        tickers:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 60
        period:
          type: integer
          default: 252
          minimum: 63
          maximum: 756
          description: Lookback window in trading days (252 = 52 weeks)

    AmfRow:
      type: object
      required:
        - ticker
        - phase
        - score
        - mirrorPhase
        - mirrorScore
        - close
        - periodLow
        - periodHigh
        - rangePosition
        - pctFromLow
        - pctToHigh
        - rsi14
        - roc20
        - roc63
        - relVol20
        - reason
        - mirrorReason
      properties:
        ticker:
          type: string
        phase:
          type: string
        score:
          type: number
        mirrorPhase:
          type: string
        mirrorScore:
          type: number
        close:
          type: number
        periodLow:
          type: number
        periodHigh:
          type: number
        rangePosition:
          type: number
        pctFromLow:
          type: number
        pctToHigh:
          type: number
        rsi14:
          type: number
        roc20:
          type: number
        roc63:
          type: number
        relVol20:
          type: number
        reason:
          type: string
        mirrorReason:
          type: string
        error:
          type: ["string", "null"]

    AmfScanResult:
      type: object
      required: [results, period, scannedAt]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/AmfRow"
        period:
          type: integer
        scannedAt:
          type: string
          format: date-time

    AmfDiscoverItem:
      type: object
      required: [symbol, shortName, regularMarketPrice, exchange]
      properties:
        symbol:
          type: string
        shortName:
          type: string
        regularMarketPrice:
          type: number
        marketCap:
          type: ["number", "null"]
        exchange:
          type: string
        sector:
          type: ["string", "null"]

    AmfDiscoverResult:
      type: object
      required: [tickers, items, screen, count]
      properties:
        tickers:
          type: array
          items:
            type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/AmfDiscoverItem"
        screen:
          type: string
        count:
          type: integer
